<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehrin Efendileri - Karşılaştırma</title>

    <meta property="og:title" content="Şehrin Efendileri - Oyuncu Karşılaştırma">
    <meta property="og:description" content="Senin istatistiklerin sunucunun efendisi olmaya yetecek mi? Karşılaştır ve meydan oku!">
    <meta property="og:image" content="banner.jpg">
    <meta property="og:type" content="website">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* =========================================
           1. GENEL TASARIM & TEMA
        ========================================= */
        body { 
            background: url("banner.jpg") center center / cover no-repeat fixed;
            color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center;
            padding: 10px; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center;
        }
        
        /* KARANLIK FİLTRE HAFİFLETİLDİ (0.88 -> 0.65) */
        body::before { 
            content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(10px); z-index: 0; 
        }
        
        /* Görsel indirilirken bulanıklığı ve siyahlığı geçici olarak gizlemek için */
        body.capture-mode::before {
            display: none !important;
        }

        .content-wrap { position: relative; z-index: 10; width: 100%; max-width: 900px; padding-top: 5px; }

        h1 { color: #e5e7eb; margin: 10px 0 25px 0; text-transform: uppercase; letter-spacing: 3px; font-size: 18px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* =========================================
           2. ARAMA ALANI (MOR VURGU)
        ========================================= */
        .search-box { margin-bottom: 30px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .input-group { display: flex; gap: 5px; }
        .player-input { 
            padding: 12px; border-radius: 8px; border: 1px solid #8B5CF6; width: 160px; 
            background: #000; color: #fff; outline: none; font-size: 13px; text-align: center; transition: 0.3s;
        }
        .player-input:focus { border-color: #7C3AED; box-shadow: 0 0 10px rgba(139,92,246,0.35); }
        
        #search-btn { 
            padding: 12px 20px; cursor: pointer; background: #6D28D9; border: none; 
            border-radius: 8px; font-weight: 800; color: #fff; font-size: 13px; transition: 0.3s; text-transform: uppercase; 
        }
        #search-btn:hover:not(:disabled) { background: #7C3AED; transform: translateY(-2px); box-shadow: 0 0 15px rgba(139,92,246,0.35); }
        #search-btn:disabled { background: #4b5563; cursor: not-allowed; }

        #error-message { color: #ef4444; display: none; font-weight: bold; margin-bottom: 15px; font-size: 14px; }

        /* =========================================
           3. KART TASARIMI (MOR TEMA GERİ GETİRİLDİ)
        ========================================= */
        #comparison-wrapper { display: none; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.5s ease-out; padding: 20px 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .cards-layout { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; position: relative; }
        @media(min-width: 768px) { .cards-layout { flex-direction: row; justify-content: center; align-items: stretch; gap: 40px; } }

        /* KART ZEMİNİ VE KENARLIKLARI SİTENİN ORİJİNAL MOR PALETİNE DÖNDÜRÜLDÜ */
        .player-card { 
            background: linear-gradient(160deg, #180a24, #000); 
            border: 1px solid rgba(139, 92, 246, 0.3); 
            padding: 25px; border-radius: 28px; width: 100%; max-width: 380px; 
            text-align: left; position: relative; box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            box-sizing: border-box; transition: transform 0.3s ease;
        }

        .vs-badge {
            background: #000; border: 2px solid #8B5CF6; color: #e5e7eb; font-size: 24px; font-weight: 900; 
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            z-index: 20; box-shadow: 0 0 20px rgba(139,92,246,0.35);
        }
        @media(max-width: 767px) { .vs-badge { margin: -10px 0; } }

        /* Rozetler */
        .badge-box { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; min-height: 30px; }
        .badge { 
            font-size: 11px; padding: 5px 14px; border-radius: 8px; background: rgba(229, 231, 235, 0.1); 
            color: #e5e7eb; font-weight: 900; border: 1px solid rgba(229, 231, 235, 0.3); 
            text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
        }

        /* Nick ve Sunucu Bilgisi */
        .card-nick { 
            text-align: center; color: #ffffff; font-size: 30px; font-weight: 950; margin: 0 0 12px 0; 
            line-height: 1.1; text-transform: uppercase; text-shadow: 0 4px 10px rgba(0, 0, 0, 0.8); word-break: break-word;
        }
        /* Klan Tagı Vurgu Ayarı */
        .clan-tag { font-weight: 300; color: #94a3b8; font-size: 0.65em; letter-spacing: 1px; }

        .card-server-info { text-align: center; color: #94a3b8; font-size: 10px; font-weight: 700; margin-bottom: 25px; letter-spacing: 1.2px; }

        /* İstatistik Satırları */
        .stat-container { display: flex; flex-direction: column; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; font-size: 14px; }
        .stat-row b { color: #94a3b8; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-row span { font-weight: 800; color: #eee; font-size: 16px; transition: color 0.3s; }

        .stat-win { color: #22c55e !important; text-shadow: 0 0 10px rgba(34, 197, 94, 0.4); font-size: 110% !important; }
        .stat-lose { color: #6b7280 !important; }
        .stat-tie { color: #facc15 !important; }

        /* =========================================
           4. KAZANAN PANELİ & ANALİZ
        ========================================= */
        .results-section { margin-top: 40px; width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; align-items: center; }

        /* KAZANAN PANELİ ORİJİNAL MOR TEMA */
        .winner-panel {
            background: linear-gradient(160deg, #180a24, #000); 
            border: 1px solid rgba(139,92,246,0.8); 
            border-radius: 20px; 
            padding: 20px 25px; text-align: center; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 15px rgba(139,92,246,0.25); 
            width: 100%; box-sizing: border-box;
        }
        .winner-title { font-size: 16px; color: #facc15; font-weight: 900; letter-spacing: 2px; margin-bottom: 5px; }
        .winner-name { font-size: 32px; color: #fff; font-weight: 950; text-transform: uppercase; text-shadow: 0 4px 10px rgba(0,0,0,0.8); margin-bottom: 15px; line-height: 1.1; }
        
        .winner-score-label { font-size: 11px; color: #94a3b8; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        .winner-score-val { font-size: 26px; color: #fff; font-weight: 950; margin-bottom: 15px; letter-spacing: 2px; }

        .checklist { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; max-width: 250px; margin: 0 auto; background: rgba(255,255,255,0.03); padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .check-item { font-size: 13px; font-weight: 800; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .text-win { color: #22c55e; }
        .text-lose { color: #ef4444; }
        .text-tie { color: #facc15; }

        .winner-summary { margin-top: 15px; font-size: 12px; color: #94a3b8; font-style: italic; font-weight: 600; letter-spacing: 0.5px; }

        /* Güçlendirilmiş Analiz Kutusu */
        .analysis-text { 
            color: #e2e8f0; 
            font-size: 15px; 
            line-height: 1.8; 
            font-weight: 500;
            font-style: italic; 
            background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(0,0,0,0.3)); 
            padding: 20px 25px; 
            border-radius: 12px; 
            border-left: 4px solid #6D28D9; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            width: 100%;
            box-sizing: border-box;
        }
        .analysis-text strong {
            color: #fff;
            font-weight: 900;
            font-size: 16px;
        }

        /* =========================================
           5. AKSİYON BUTONLARI
        ========================================= */
        .action-buttons { display: flex; gap: 10px; width: 100%; max-width: 600px; justify-content: center; flex-wrap: wrap; margin-top: 5px; }
        .btn-action { padding: 12px 15px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 10px; transition: 0.2s; background: #000; border: 2px solid rgba(255,255,255,0.15); color: #fff; letter-spacing: 1px; text-transform: uppercase; }
        .btn-download { border-color: #8B5CF6; background: #6D28D9; }
        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .btn-download:hover { background: #7C3AED; box-shadow: 0 0 15px rgba(139,92,246,0.35); }
    </style>
</head>
<body>

<div class="content-wrap">
    <h1>OYUNCU KARŞILAŞTIR</h1>
    
    <div class="search-box">
        <div class="input-group">
            <input id="p1-input" class="player-input" placeholder="1. Oyuncu Nick" autocomplete="off">
            <input id="p2-input" class="player-input" placeholder="2. Oyuncu Nick" autocomplete="off">
        </div>
        <button id="search-btn" onclick="ComparisonController.start()">KARŞILAŞTIR</button>
    </div>

    <div id="error-message"></div>

    <div id="comparison-wrapper">
        <div class="cards-layout">
            <div id="card-1" class="player-card">
                <div id="p1-badges" class="badge-box"></div>
                <h2 id="p1-nick" class="card-nick">-</h2>
                <div class="card-server-info">SEHRİN EFENDİLERİ • 95.173.173.81</div>
                <div id="p1-stats" class="stat-container"></div>
            </div>

            <div class="vs-badge">VS</div>

            <div id="card-2" class="player-card">
                <div id="p2-badges" class="badge-box"></div>
                <h2 id="p2-nick" class="card-nick">-</h2>
                <div class="card-server-info">SEHRİN EFENDİLERİ • 95.173.173.81</div>
                <div id="p2-stats" class="stat-container"></div>
            </div>
        </div>

        <div class="results-section">
            <div id="winner-panel" class="winner-panel" style="display:none;">
                <div class="winner-title">🏆 KAZANAN</div>
                <div id="winner-name" class="winner-name">-</div>
                
                <div class="winner-score-label">KARŞILAŞTIRMA SKORU</div>
                <div id="winner-score-txt" class="winner-score-val">0 - 0</div>
                
                <div id="winner-checklist" class="checklist"></div>
                <div id="winner-summary" class="winner-summary"></div>
            </div>
            
            <div id="analysis-box" class="analysis-text"></div>

            <div class="action-buttons">
                <button class="btn-action btn-download" onclick="ComparisonController.downloadImage()">SONUCU İNDİR</button>
                <button class="btn-action" onclick="ComparisonController.copyShareLink()">LİNKİ KOPYALA</button>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * ==========================================================
 * 1. KONFİGÜRASYON VE VERİ YAPISI
 * ==========================================================
 */
const CONFIG = {
    SUPABASE_URL: "https://ksevvntxdkuexulklmph.supabase.co",
    SUPABASE_KEY: "sb_publishable_9iHDw5_WEWyNnCz_wXIMuA_VPt36UTL",
    
    STAT_KEYS: ['kd', 'kills', 'dmg', 'hs', 'deaths'],
    WEIGHTS: { kd: 1, kills: 1, dmg: 1, hs: 1, deaths: 1 }, 
    INVERSE: { deaths: true },
    
    NAMES: { kd: "K/D Oranı", kills: "Öldürme", dmg: "Toplam Hasar", hs: "HS Oranı", deaths: "Ölüm" },
    BADGES: { kd: "K/D LİDERİ", kills: "SKOR LİDERİ", dmg: "HASAR KRALI", hs: "HS USTASI", deaths: "HAYATTA KALMA USTASI" },
    
    FORMAT: {
        kd: (v) => v.toFixed(2),
        kills: (v) => Math.floor(v).toLocaleString('tr-TR'),
        dmg: (v) => Math.floor(v).toLocaleString('tr-TR'),
        hs: (v) => `%${Math.floor(v)}`,
        deaths: (v) => Math.floor(v).toLocaleString('tr-TR')
    }
};

const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

/**
 * ==========================================================
 * 2. YARDIMCI FONKSİYONLAR
 * ==========================================================
 */
const Utils = {
    showError: (msg) => {
        const el = document.getElementById('error-message');
        el.innerText = msg; el.style.display = msg ? "block" : "none";
    },
    setLoading: (isLoading) => {
        const btn = document.getElementById('search-btn');
        btn.disabled = isLoading; btn.innerText = isLoading ? "KARŞILAŞTIRILIYOR..." : "KARŞILAŞTIR";
    },
    animateValue: (obj, start, end, duration, formatFn) => {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            let val = progress * (end - start) + start;
            obj.innerHTML = formatFn(val);
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    },
    // Klan tagını otomatik hafifleştiren formül
    formatNick: (nick) => {
        const regex = /(\|\s*EFEND[İI]\s*\|)/i;
        if(regex.test(nick)) {
            return nick.replace(regex, '<span class="clan-tag">$1</span>');
        }
        return nick;
    }
};

/**
 * ==========================================================
 * 3. ANA DENETLEYİCİ
 * ==========================================================
 */
const ComparisonController = {
    init: () => {
        document.getElementById('p1-input').value = "";
        document.getElementById('p2-input').value = "";

        // URL parametrelerini tam ve doğru olarak oku
        const urlParams = new URLSearchParams(window.location.search);
        const p1 = urlParams.get('p1'); 
        const p2 = urlParams.get('p2');

        if (window.history.replaceState) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        if (p1 && p2) {
            document.getElementById('p1-input').value = p1.trim();
            document.getElementById('p2-input').value = p2.trim();
            ComparisonController.start(true);
        }
    },

    start: async (isAutoStart = false) => {
        const n1 = document.getElementById('p1-input').value.trim();
        const n2 = document.getElementById('p2-input').value.trim();

        if (!n1 || !n2) return Utils.showError("Lütfen her iki oyuncunun da nickini girin.");
        
        Utils.showError(""); Utils.setLoading(true);
        document.getElementById('comparison-wrapper').style.display = "none";

        try {
            const data = await DataService.fetchPlayers(n1, n2);
            const analysis = AnalysisService.calculate(data.p1, data.p2);

            RenderService.drawCards(analysis);
            RenderService.drawWinnerPanel(analysis);

            document.getElementById('comparison-wrapper').style.display = "flex";
        } catch (err) {
            Utils.showError(err.message);
        } finally {
            Utils.setLoading(false);
        }
    },

    copyShareLink: () => {
        // İsimleri input'tan almak, etiketlerden oluşabilecek HTML boşluklarını önler
        const n1 = document.getElementById('p1-input').value.trim();
        const n2 = document.getElementById('p2-input').value.trim();
        
        const url = window.location.origin + window.location.pathname + `?p1=${encodeURIComponent(n1)}&p2=${encodeURIComponent(n2)}`;
        
        navigator.clipboard.writeText(url).then(() => alert("Karşılaştırma linki kopyalandı!"));
    },

    downloadImage: () => {
        const wrapper = document.getElementById('comparison-wrapper');
        const actionBtns = document.querySelector('.action-buttons');
        
        // Görüntü alınırken butonları gizle ve KARANLIK FİLTREYİ KALDIR
        actionBtns.style.display = 'none';
        document.body.classList.add('capture-mode');

        // Tarayıcının karanlık filtreyi sildiğini "anlayabilmesi" için ufak bir gecikme ekledik. (Hayalet/Karanlık çıkma sorununu kökten çözer)
        setTimeout(() => {
            html2canvas(wrapper, {
                backgroundColor: "#0d0514", 
                scale: 2, 
                useCORS: true
            }).then(canvas => {
                // İşlem bitince butonları ve filtreyi geri getir
                actionBtns.style.display = 'flex'; 
                document.body.classList.remove('capture-mode');
                
                // İsimleri inputlardan temiz al
                const n1 = document.getElementById('p1-input').value.trim();
                const n2 = document.getElementById('p2-input').value.trim();
                
                // Dosya isminde hata yaratacak | gibi işaretleri temizle
                const safeName = (name) => name.replace(/\|/g, '').trim().replace(/\s+/g, '_');
                
                const link = document.createElement('a');
                link.download = `${safeName(n1)}_VS_${safeName(n2)}_Karsilastirma.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            }).catch(err => {
                console.error("Görsel oluşturma hatası:", err);
                actionBtns.style.display = 'flex';
                document.body.classList.remove('capture-mode');
                Utils.showError("Görsel oluşturulamadı.");
            });
        }, 100);
    }
};

/**
 * ==========================================================
 * 4. VERİ KATMANI
 * ==========================================================
 */
const DataService = {
    fetchPlayers: async (n1, n2) => {
        const [res1, res2] = await Promise.all([
            supabaseClient.rpc('search_player', { search_input: n1 }),
            supabaseClient.rpc('search_player', { search_input: n2 })
        ]);

        if (res1.error || res2.error) throw new Error("Veritabanı bağlantı hatası.");
        if (!res1.data || res1.data.length === 0) throw new Error(`1. Oyuncu (${n1}) bulunamadı.`);
        if (!res2.data || res2.data.length === 0) throw new Error(`2. Oyuncu (${n2}) bulunamadı.`);

        return { p1: res1.data[0], p2: res2.data[0] };
    }
};

/**
 * ==========================================================
 * 5. ANALİZ KATMANI
 * ==========================================================
 */
const AnalysisService = {
    calculate: (raw1, raw2) => {
        const parse = (p) => ({
            nick: p.nick,
            kd: Number(p.total_kills) / (Number(p.total_deaths) || 1),
            kills: Number(p.total_kills),
            dmg: Number(p.total_damage || 0),
            hs: Number(p.hs_percent || 0),
            deaths: Number(p.total_deaths),
            globalRank: null, weeklyRank: null, countryRank: null, playTime: null, accuracy: null
        });

        const p1 = parse(raw1), p2 = parse(raw2);
        let s1 = 0, s2 = 0;
        const res = {}, cats = { p1: [], p2: [], ties: [] };

        CONFIG.STAT_KEYS.forEach(key => {
            const v1 = p1[key], v2 = p2[key], pts = CONFIG.WEIGHTS[key];
            if (v1 === v2) {
                cats.ties.push(key); res[key] = 'tie';
            } else {
                const p1Wins = CONFIG.INVERSE[key] ? (v1 < v2) : (v1 > v2);
                if (p1Wins) { s1 += pts; cats.p1.push(key); res[key] = 'p1'; }
                else { s2 += pts; cats.p2.push(key); res[key] = 'p2'; }
            }
        });

        return { p1, p2, scores: { p1: s1, p2: s2 }, res, cats };
    }
};

/**
 * ==========================================================
 * 6. GÖRÜNÜM (RENDER) KATMANI
 * ==========================================================
 */
const RenderService = {
    drawCards: (data) => {
        const { p1, p2, res, cats } = data;
        
        ['p1', 'p2'].forEach((pKey) => {
            const player = pKey === 'p1' ? p1 : p2;
            
            // Formatlı (Klan tagı inceltilmiş) Nick yazdırımı
            document.getElementById(`${pKey}-nick`).innerHTML = Utils.formatNick(player.nick);
            
            const badgesHTML = cats[pKey].slice(0, 3).map(k => `<span class="badge">${CONFIG.BADGES[k]}</span>`).join('');
            document.getElementById(`${pKey}-badges`).innerHTML = badgesHTML;

            let statsHTML = '';
            CONFIG.STAT_KEYS.forEach(statKey => {
                const colorClass = res[statKey] === pKey ? 'stat-win' : (res[statKey] === 'tie' ? 'stat-tie' : 'stat-lose');
                statsHTML += `
                    <div class="stat-row">
                        <b>${CONFIG.NAMES[statKey]}</b> 
                        <span id="${pKey}-stat-${statKey}" class="${colorClass}">0</span>
                    </div>
                `;
            });
            document.getElementById(`${pKey}-stats`).innerHTML = statsHTML;

            setTimeout(() => {
                CONFIG.STAT_KEYS.forEach(statKey => {
                    const el = document.getElementById(`${pKey}-stat-${statKey}`);
                    Utils.animateValue(el, 0, player[statKey], 1000, CONFIG.FORMAT[statKey]);
                });
            }, 100);
        });
    },

    drawWinnerPanel: (data) => {
        const { p1, p2, scores, res, cats } = data;
        const panel = document.getElementById('winner-panel');
        const nameEl = document.getElementById('winner-name');
        const scoreTxt = document.getElementById('winner-score-txt');
        const checklistEl = document.getElementById('winner-checklist');
        const summaryEl = document.getElementById('winner-summary');
        const analysisEl = document.getElementById('analysis-box');

        let winnerNick = "", winnerKey = "";

        if (scores.p1 > scores.p2) {
            winnerNick = p1.nick; winnerKey = 'p1';
            scoreTxt.innerText = `${scores.p1} - ${scores.p2}`;
            panel.style.display = "block";
        } else if (scores.p2 > scores.p1) {
            winnerNick = p2.nick; winnerKey = 'p2';
            scoreTxt.innerText = `${scores.p2} - ${scores.p1}`;
            panel.style.display = "block";
        } else {
            panel.style.display = "none";
            analysisEl.innerText = "İki oyuncu da aynı karşılaştırma skoruna ulaştı. Belirleyici bir üstünlük oluşmadığı için karşılaşma berabere sonuçlandı.";
            return;
        }

        // Kazanan ismini de aynı ince klan formatıyla basıyoruz
        nameEl.innerHTML = Utils.formatNick(winnerNick);

        let checklistHTML = '';
        CONFIG.STAT_KEYS.forEach(key => {
            const isTie = res[key] === 'tie';
            const isWon = res[key] === winnerKey;
            
            let icon = isTie ? '➖' : (isWon ? '✔' : '✖');
            let color = isTie ? 'text-tie' : (isWon ? 'text-win' : 'text-lose');
            
            checklistHTML += `<div class="check-item ${color}"><span>${icon}</span> ${CONFIG.NAMES[key]}</div>`;
        });
        checklistEl.innerHTML = checklistHTML;

        const suffixes = { 1: "1'inde", 2: "2'sinde", 3: "3'ünde", 4: "4'ünde", 5: "5'inde", 0: "hiçbirinde" };
        const wonCount = cats[winnerKey].length;
        const totalCount = CONFIG.STAT_KEYS.length;
        summaryEl.innerText = `${totalCount} istatistiğin ${suffixes[wonCount] || wonCount} rakibinden üstün performans gösterdi.`;

        analysisEl.innerHTML = `<strong>${Utils.formatNick(winnerNick)}</strong>, karşılaştırılan istatistiklerde rakibine göre daha yüksek genel performans gösterdi.`;
    }
};

// Sayfa yüklendiğinde başlat
document.addEventListener('DOMContentLoaded', ComparisonController.init);
</script>
</body>
</html>
